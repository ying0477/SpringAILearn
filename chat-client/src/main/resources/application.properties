spring.application.name=chat-client

logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor = DEBUG

# MySQL数据源
spring.datasource.url=jdbc:mysql://XX/spring_ai?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=XX
spring.datasource.password=XX
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# jdbc存储记忆对话
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=classpath:/sql/schema-mysql.sql

spring.ai.deepseek.api-key=XX
spring.ai.deepseek.chat.options.model=deepseek-chat

# Redis存储记忆对话
spring.ai.memory.redis.host=XX
spring.ai.memory.redis.port=6379
spring.ai.memory.redis.password=XX
spring.ai.memory.redis.timeout=XX
